name: Deploy web to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `git rev-list --count HEAD` is correct

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Compute build identity
        id: build_id
        run: |
          echo "build_number=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          echo "git_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Guardrail: NEXT_PUBLIC_* values are baked at build time. If the worker
      # URL is missing here, the dashboard ships with the `http://localhost:8787`
      # fallback from apps/web/src/lib/api.ts and every browser fetch fails in
      # prod. Fail loudly instead of shipping a broken bundle.
      - name: Verify required build-time env vars
        env:
          NEXT_PUBLIC_WORKER_BASE_URL: ${{ vars.NEXT_PUBLIC_WORKER_BASE_URL }}
        run: |
          if [ -z "${NEXT_PUBLIC_WORKER_BASE_URL:-}" ]; then
            echo "::error::NEXT_PUBLIC_WORKER_BASE_URL is not set (repo variable). Refusing to build — would bake localhost:8787 into the production bundle." >&2
            exit 1
          fi
          case "$NEXT_PUBLIC_WORKER_BASE_URL" in
            http://localhost*|http://127.0.0.1*)
              echo "::error::NEXT_PUBLIC_WORKER_BASE_URL points to localhost ($NEXT_PUBLIC_WORKER_BASE_URL). Refusing to build." >&2
              exit 1
              ;;
          esac
          echo "NEXT_PUBLIC_WORKER_BASE_URL=$NEXT_PUBLIC_WORKER_BASE_URL"

      - name: Build web
        run: pnpm --filter @platform-status-monitor/web build
        env:
          NEXT_PUBLIC_BUILD_NUMBER: ${{ steps.build_id.outputs.build_number }}
          NEXT_PUBLIC_GIT_SHA: ${{ steps.build_id.outputs.git_sha }}
          NEXT_PUBLIC_WORKER_BASE_URL: ${{ vars.NEXT_PUBLIC_WORKER_BASE_URL }}

      # wrangler-action tries `pnpm add wrangler` at workspace root, which
      # pnpm refuses without -w. Install wrangler globally via npm instead
      # and invoke it directly — sidesteps the package-manager detection.
      - name: Install wrangler
        run: npm i -g wrangler@4

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy apps/web/out --project-name=n9c-platformstatusmonitor --branch=main
